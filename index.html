<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>T-CoiN Wallet</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;}

body{
background:linear-gradient(135deg,#020617,#0f172a,#020617);
color:white;min-height:100vh;overflow-x:hidden;
}

header{
display:flex;justify-content:space-between;align-items:center;
padding:20px;background:#020617;position:fixed;width:100%;top:0;z-index:100;
box-shadow:0 0 20px rgba(0,0,0,.6);
}

.logo{font-size:22px;font-weight:bold;letter-spacing:1px;}

.container{padding-top:90px;max-width:900px;margin:auto;padding:0 20px;}

.hidden{display:none;}

.hero{text-align:center;padding:70px 20px;animation:fadeIn 1s;}

.hero h1{font-size:52px;margin-bottom:20px;}
.hero p{opacity:.8;margin-bottom:30px;font-size:18px;}

button{
padding:14px 18px;border:none;border-radius:10px;cursor:pointer;
background:#3b82f6;color:white;margin:5px;font-size:15px;transition:.3s;
}

button:hover{transform:scale(1.05);box-shadow:0 0 10px #3b82f6;}

.secondary{background:#1e293b;}

input{
width:100%;padding:14px;margin-top:10px;border:none;border-radius:8px;
background:#0f172a;color:white;
}

.auth{max-width:420px;margin:auto;animation:fadeIn .5s;}

.card{
background:#1e293b;padding:25px;border-radius:16px;margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,.6);
}

.wallet-card{text-align:center;}
.wallet-card h1{font-size:42px;margin-top:10px;transition:.3s;}

.actions{
display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;margin-bottom:20px;
}

.actions button{background:#0f172a;}

.features{
display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;margin-top:40px;
}

.feature{
background:#1e293b;padding:25px;border-radius:14px;text-align:center;
transition:.3s;
}

.feature:hover{transform:translateY(-5px);}

.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;
}

.modal-box{
background:#1e293b;padding:30px;border-radius:16px;width:90%;max-width:420px;text-align:center;
}

.toast{
position:fixed;bottom:20px;right:20px;background:#3b82f6;
padding:15px 20px;border-radius:8px;opacity:0;transform:translateY(20px);transition:.4s;
}

.toast.show{opacity:1;transform:translateY(0);}

.history-item{
background:#1e293b;padding:14px;border-radius:10px;margin-bottom:10px;
}

.qr{
background:white;padding:10px;display:inline-block;margin-top:10px;border-radius:8px;
}

</style>
</head>

<body>

<header>
<div class="logo">T-CoiN</div>
<div id="navButtons">
<button onclick="showLogin()">Iniciar sesión</button>
<button onclick="showRegister()">Crear cuenta</button>
</div>
</header>

<div class="container">

<div id="landing">
<div class="hero">
<h1>T-CoiN</h1>
<p>Plataforma digital para enviar y recibir pagos de forma rápida y segura</p>
<button onclick="showRegister()">Crear cuenta</button>
<button onclick="showLogin()" class="secondary">Iniciar sesión</button>
</div>
</div>

<div id="register" class="hidden auth">
<h2>Crear cuenta</h2>
<input id="rName" placeholder="Nombre completo">
<input id="rUser" placeholder="Usuario único">
<input id="rPass" type="password" placeholder="Contraseña">
<br><br>
<button onclick="register()">Crear cuenta</button>
</div>

<div id="login" class="hidden auth">
<h2>Iniciar sesión</h2>
<input id="lUser" placeholder="Usuario">
<input id="lPass" type="password" placeholder="Contraseña">
<br><br>
<button onclick="login()">Entrar</button>
</div>

<div id="dashboard" class="hidden">
<div class="card wallet-card">
<h2 id="welcome"></h2>
<h1 id="balance"></h1>
</div>

<div class="actions">
<button onclick="openSend()">Enviar</button>
<button onclick="openReceive()">Recibir</button>
<button onclick="openQR()">QR</button>
<button onclick="scanQR()">Escanear</button>
<button onclick="showHistory()">Historial</button>
<button onclick="profile()">Perfil</button>
<button onclick="logout()">Salir</button>
</div>

<div id="historyList"></div>

</div>

</div>

<div id="modal" class="hidden modal"></div>
<div id="toast" class="toast"></div>

<script>

const modal = document.getElementById("modal")

modal.onclick = e=>{
if(e.target.id==="modal") closeModal()
}

function toast(msg){
let t=document.getElementById("toast")
t.innerText=msg
t.classList.add("show")
setTimeout(()=>t.classList.remove("show"),3000)
}

function show(id){
["landing","login","register","dashboard"].forEach(x=>{
document.getElementById(x).classList.add("hidden")
})
document.getElementById(id).classList.remove("hidden")
}

function showLogin(){show("login")}
function showRegister(){show("register")}

function register(){
let name=rName.value,user=rUser.value,pass=rPass.value
if(!name||!user||!pass)return toast("Completa todo")

let users=JSON.parse(localStorage.getItem("users"))||[]

if(users.find(u=>u.usuario===user)) return toast("Usuario existe")

users.push({nombre:name,usuario:user,password:pass,saldo:1000,historial:[]})
localStorage.setItem("users",JSON.stringify(users))

toast("Cuenta creada")
showLogin()
}

function login(){
let user=lUser.value,pass=lPass.value
let users=JSON.parse(localStorage.getItem("users"))||[]

let u=users.find(x=>x.usuario===user)

if(!u) return toast("No existe")
if(u.password!==pass) return toast("Error")

localStorage.setItem("currentUser",user)
loadDashboard()
}

function loadDashboard(){
let user=localStorage.getItem("currentUser")
if(!user) return show("landing")

let users=JSON.parse(localStorage.getItem("users"))
let u=users.find(x=>x.usuario===user)

if(!u){ logout(); return }

welcome.innerText="Hola "+u.nombre
balance.innerText=u.saldo+" TCN"

show("dashboard")
}

function logout(){
localStorage.removeItem("currentUser")
show("landing")
}

function transfer(to,amount){

if(!to) return toast("Usuario requerido")
if(isNaN(amount) || amount<=0) return toast("Monto inválido")
if(to === localStorage.getItem("currentUser")) return toast("No puedes enviarte a ti mismo")

let users=JSON.parse(localStorage.getItem("users"))
let sender=users.find(u=>u.usuario===localStorage.getItem("currentUser"))
let receiver=users.find(u=>u.usuario===to)

if(!sender){ logout(); return }
if(!receiver)return toast("No existe")
if(sender.saldo<amount)return toast("Sin saldo")

sender.saldo-=amount
receiver.saldo+=amount

let date=new Date().toLocaleString()

sender.historial.unshift({
tipo:"enviado",
monto:amount,
usuarioRelacionado:to,
fecha:date
})

receiver.historial.unshift({
tipo:"recibido",
monto:amount,
usuarioRelacionado:sender.usuario,
fecha:date
})

localStorage.setItem("users",JSON.stringify(users))
toast("Enviado")
loadDashboard()
}

function openSend(){
modal.innerHTML=`<div class="modal-box">
<input id="toUser" placeholder="Usuario destino">
<input id="toAmount" placeholder="Cantidad">
<button onclick="confirmSend()">Enviar</button>
</div>`
modal.classList.remove("hidden")
}

function confirmSend(){
transfer(toUser.value,parseFloat(toAmount.value))
closeModal()
}

function openReceive(){
let user=localStorage.getItem("currentUser")
modal.innerHTML=`<div class="modal-box">
<p>${user}</p>
<div id="qr"></div>
</div>`
modal.classList.remove("hidden")
setTimeout(()=>new QRCode(document.getElementById("qr"),user),200)
}

function openQR(){
modal.innerHTML=`<div class="modal-box">
<input id="qrAmount" placeholder="Cantidad">
<button onclick="makeQR()">Generar</button>
<div id="qr"></div>
</div>`
modal.classList.remove("hidden")
}

function makeQR(){
let amount = qrAmount.value
if(!amount || isNaN(amount) || amount<=0) return toast("Monto inválido")

let code=localStorage.getItem("currentUser")+":"+amount
document.getElementById("qr").innerHTML=""
new QRCode(document.getElementById("qr"),code)
}

function scanQR(){
modal.innerHTML=`<div class="modal-box">
<input id="scan" placeholder="Pega el QR">
<button onclick="processQR()">OK</button>
</div>`
modal.classList.remove("hidden")
}

function processQR(){
if(!scan.value.includes(":")) return toast("QR inválido")

let [u,a]=scan.value.split(":")
transfer(u,parseFloat(a))
closeModal()
}

function showHistory(){
let users=JSON.parse(localStorage.getItem("users"))
let u=users.find(x=>x.usuario===localStorage.getItem("currentUser"))

let list=document.getElementById("historyList")
list.innerHTML=""

u.historial.forEach(t=>{
let div=document.createElement("div")
div.className="history-item"
div.innerText=`${t.tipo} ${t.monto} TCN con ${t.usuarioRelacionado} - ${t.fecha}`
list.appendChild(div)
})
}

function profile(){
modal.innerHTML=`<div class="modal-box">
<p>${localStorage.getItem("currentUser")}</p>
</div>`
modal.classList.remove("hidden")
}

function closeModal(){
modal.classList.add("hidden")
}

loadDashboard()

</script>

</body>
</html>
